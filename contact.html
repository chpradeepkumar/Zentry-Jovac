<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentry | Access Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        form {
            background: #111827;
            padding: 35px;
            border-radius: 12px;
            max-width: 650px;
            margin: 20px auto;
            border: 1px solid #1f2937;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #f3f4f6;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: #0b0f19;
            border: 1px solid #1f2937;
            color: #ffffff;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #818cf8;
            outline: none;
        }

        .inline-group {
            display: flex;
            gap: 25px;
            align-items: center;
            padding-top: 5px;
        }

        .inline-group label {
            font-weight: normal;
            color: #9ca3af;
            cursor: pointer;
        }

        .inline-group input {
            width: auto;
            margin-right: 6px;
            accent-color: #818cf8;
        }

        .btn-reset {
            background-color: #ef4444;
            color: #fff;
            margin-left: 12px;
        }

        .btn-reset:hover {
            background-color: #dc2626;
            box-shadow: none;
        }
    </style>
</head>

<body>

    <header>
        <nav>
            <div class="logo">⚡ Zentry</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="product.html">Product</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2 style="text-align: center; display: block; width: fit-content; margin: 0 auto 35px;">User Registration
            Portal</h2>

        <form action="#" method="POST">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" required placeholder="name@domain.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="10-digit smartphone number">
            </div>

            <div class="form-group">
                <label for="date">Expected Target Activation Date</label>
                <input type="date" id="date" name="date">
            </div>

            <div class="form-group">
                <label for="cluster">Target Deployment Cluster</label>
                <select id="cluster" name="cluster">
                    <option value="">-- Choose Option --</option>
                    <option value="dev">Developer Sandbox</option>
                    <option value="prod">Enterprise Production Cluster</option>
                </select>
            </div>

            <div class="form-group">
                <label>Operational Scale</label>
                <div class="inline-group">
                    <label><input type="radio" name="scale" value="small"> Single Node Team</label>
                    <label><input type="radio" name="scale" value="large"> Multi-Cluster Network</label>
                </div>
            </div>

            <div class="form-group">
                <label>System Clearance Options</label>
                <div class="inline-group">
                    <label><input type="checkbox" name="sys" value="mfa"> Enable Mandatory MFA</label>
                    <label><input type="checkbox" name="sys" value="logs"> Opt-In Early Patch Beta</label>
                </div>
            </div>

            <div class="form-group">
                <label for="msg">Custom Architecture Requirements</label>
                <textarea id="msg" name="msg" rows="4"
                    placeholder="Detail specific storage configurations here..."></textarea>
            </div>

            <div>
                <button type="submit" class="btn">Submit Registration</button>
                <button type="reset" class="btn btn-reset">Reset Fields</button>
            </div>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Zentry Systems Inc. | Connected Workspace Environments.</p>
    </footer>

</body>

</html>
